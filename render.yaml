services:
  - type: worker
    name: wildlife-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python wildlife_bot.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: DB_PATH
        value: /var/data/subscribers.db
    disk:
      name: wildlife-bot-data
      mountPath: /var/data
      sizeGB: 1
